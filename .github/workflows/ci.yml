name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend-Projet-Elderly-Assistance-Platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test and package
        run: mvn -B -q test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend-Projet-Elderly-Assistance-Platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend-Projet-Elderly-Assistance-Platform/package-lock.json
      - name: Install and build
        run: npm ci && npx ng build --configuration=development
